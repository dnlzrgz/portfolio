[tool.poetry]
name = "portfolio"
version = "0.3.3"
description = "A personal portfolio made with Django, Wagtail, a bit of CSS and a bit of JavaScript."
authors = ["dnlzrgz <24715931+dnlzrgz@users.noreply.github.com>"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.12"
wagtail = "^6.1"
django = "^5.1"
environs = "^11.0.0"
gunicorn = "^22.0.0"
psycopg = { extras = ["binary"], version = "^3.1.19" }
redis = { extras = ["hiredis"], version = "^5.0.8" }
whitenoise = { extras = ["brotli"], version = "^6.7.0" }
brotli = "^1.1.0"
django-axes = "^6.5.1"
django-storages = {extras = ["s3"], version = "^1.14.4"}

[tool.poetry.group.dev.dependencies]
djhtml = "^3.0.6"
pre-commit = "^3.8.0"
commitizen = "^3.29.0"
ruff = "^0.6.0"
django-debug-toolbar = "^4.4.6"


[tool.ruff.lint]
ignore = ["F401", 'F403']

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
