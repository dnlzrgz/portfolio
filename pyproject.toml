[project]
name = "portfolio"
version = "0.4.0"
description = "A personal portfolio made with Django and Wagtail."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "django-axes>=6.5.1",
  "django-storages[s3]>=1.14.4",
  "django>=5.1.1",
  "environs>=11.0.0",
  "gunicorn>=23.0.0",
  "psycopg>=3.2.1",
  "redis[hiredis]>=5.0.8",
  "wagtail>=6.2.1",
  "whitenoise[brotli]>=6.7.0",
]

[tool.uv]
dev-dependencies = [
  "django-debug-toolbar>=4.4.6",
]

[tool.ruff.lint]
ignore = ["F401", "F403"]
