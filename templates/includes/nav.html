{% load wagtailcore_tags navigation_tags %}

{% get_site_root as site_root %}
<nav class="nav">
  <a href="{% pageurl site_root %}" class="link link--root">
    Home
  </a>

  {% for menuitem in site_root.get_children.live.in_menu|slice:":3" %}
    <a href="{% pageurl menuitem %}" role="listitem">
      {{ menuitem.title }}
    </a>
  {% endfor %}
</nav>
