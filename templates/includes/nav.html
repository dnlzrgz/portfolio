{% load wagtailcore_tags navigation_tags %}

{% get_site_root as site_root %}
<nav class="nav" role="list">
  <a href="/" class="nav__link {% if site_root.id == page.id %}nav__link--active{% endif %}" role="listitem">
    {{ site_root.title }}
  </a>

  {% for menuitem in site_root.get_children.live.in_menu|slice:":3" %}
    <a href="{% pageurl menuitem %}" role="listitem" class="nav__link {% if menuitem.id == page.id %}nav__link--active{% endif %}">
      {{ menuitem.title }}
    </a>
  {% endfor %}
</nav>
