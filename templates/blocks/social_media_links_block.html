<section class="widget widget--social-links">
  <header class="title">
    <h2 class="title__title">{{ self.title }}</h2>
  </header>
  <main class="content">
    <ul role="list" class="social-links">
      {% for item in self.links %}
        <a href="{{ item.url }}" role="listitem" class="social-links__link"
        >{{ item.title }}</a
          >
      {% endfor %}
    </ul>
  </main>
</section>
